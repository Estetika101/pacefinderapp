name: Release

# Triggers:
#   - tag push (vX.Y.Z or vX.Y.Z-rcN): full release — builds artifacts,
#     pushes Docker to GHCR, attaches AppImages to a GitHub Release, and
#     uploads the signed .pkg to App Store Connect. Pre-release tags
#     (containing `-`) reach App Store Connect just like real tags — that's
#     how TestFlight builds are distributed. The choice between TestFlight
#     and App Store submission is made downstream in App Store Connect.
#   - pull_request: full build matrix as a smoke test, no publish.
#   - workflow_dispatch: manual debug runs, no publish.
#
# Required repo secrets for the macOS job (Settings → Secrets and variables → Actions).
# Uses App Store Connect API key auth — the modern replacement for the
# legacy Apple ID + app-specific-password flow:
#   APPLE_TEAM_ID                      — 10-char team identifier
#   APP_STORE_CONNECT_API_KEY_ID       — 10-char Key ID (App Store Connect → Users and Access → Integrations → Keys)
#   APP_STORE_CONNECT_API_ISSUER_ID    — UUID Issuer ID from the same page
#   APP_STORE_CONNECT_API_KEY_P8       — base64 of the AuthKey_XXXXXXXXXX.p8 file
#   MAC_APPLICATION_CERT_P12           — base64 of the "Mac App Distribution" .p12 (exported from Keychain)
#   MAC_APPLICATION_CERT_PASSWORD      — password set when exporting the .p12
#   MAC_INSTALLER_CERT_P12             — base64 of the "Mac Installer Distribution" .p12
#   MAC_INSTALLER_CERT_PASSWORD        — password set when exporting the .p12
#   KEYCHAIN_PASSWORD                  — arbitrary value (`openssl rand -hex 32`); unlocks the temp build keychain
#   MAC_PROVISIONING_PROFILE           — base64 of the Mac App Store .provisionprofile
#                                        (developer.apple.com → Profiles → + → Mac App Store)
#                                        Required for TestFlight eligibility (ITMS-90889).
#
# Prerequisite: a Mac app record with bundle ID `app.pacefinder.macos`
# must exist at https://appstoreconnect.apple.com (My Apps → +) before the
# first upload — altool errors with "no app record found" otherwise.
#
# Linux + Docker jobs need no extra secrets — GITHUB_TOKEN covers GHCR push.

on:
  push:
    tags: ['v*']
  pull_request:
    # PRs run the full build matrix as a smoke test (publish steps are gated
    # on `github.event_name == 'push'` so no GHCR push / MAS upload happens).
    paths:
      - '.github/workflows/release.yml'
      - 'pacefinder.spec'
      - 'Dockerfile'
      - '.dockerignore'
      - 'packaging/**'
      - 'requirements.txt'
      - 'listener.py'
      - 'config.py'
  workflow_dispatch:

permissions:
  contents: write   # create releases + upload assets
  packages: write   # push to ghcr.io

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ─── macOS · .app → .pkg → App Store Connect ────────────────────────────────
  mac-app:
    name: macOS .app (MAS)
    runs-on: macos-14   # Apple Silicon
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Resolve version
        id: version
        # PACEFINDER_VERSION       — full tag (e.g. 0.7.2-rc1). Used for filenames + Docker tags.
        # PACEFINDER_VERSION_SHORT — semver-only (e.g. 0.7.2). Apple's CFBundleShortVersionString
        #                            requires three integers — rc tags and the final tag share the
        #                            same short version and are distinguished via CFBundleVersion
        #                            (= GITHUB_RUN_NUMBER).
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="0.0.0-${GITHUB_SHA::7}"
          fi
          short="${v%%-*}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "PACEFINDER_VERSION=$v"          >> "$GITHUB_ENV"
          echo "PACEFINDER_VERSION_SHORT=$short" >> "$GITHUB_ENV"
          echo "PACEFINDER_BUILD=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: PyInstaller build
        # The spec reads PACEFINDER_VERSION_SHORT for CFBundleShortVersionString
        # and PACEFINDER_BUILD for CFBundleVersion.
        run: pyinstaller pacefinder.spec --clean --noconfirm

      - name: Smoke test (.app boots and serves /status)
        run: |
          set -euo pipefail
          open -a "$(pwd)/dist/Pacefinder.app" --args --port 8765
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8765/status >/dev/null; then
              echo "smoke OK on try $i"; break
            fi
            sleep 1
            if [ "$i" = "20" ]; then echo "smoke FAILED"; exit 1; fi
          done
          # Kill the bundled process. pgrep on the bundle name is more reliable
          # than `pkill -f` for app bundles.
          pkill -f "Pacefinder.app/Contents/MacOS/pacefinder" || true

      # Every tag push reaches App Store Connect — that's how TestFlight is
      # populated. PR and workflow_dispatch runs skip signing and upload the
      # unsigned .app as an artifact for inspection.
      - name: Skip MAS publish (non-tag run)
        if: github.event_name != 'push'
        run: |
          echo "Skipping codesign + App Store Connect upload (event=${{ github.event_name }})."

      - name: Import signing certificates
        if: github.event_name == 'push'
        env:
          APP_CERT_P12:        ${{ secrets.MAC_APPLICATION_CERT_P12 }}
          APP_CERT_PASSWORD:   ${{ secrets.MAC_APPLICATION_CERT_PASSWORD }}
          INST_CERT_P12:       ${{ secrets.MAC_INSTALLER_CERT_P12 }}
          INST_CERT_PASSWORD:  ${{ secrets.MAC_INSTALLER_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD:   ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"

          echo "$APP_CERT_P12"  | base64 --decode > app.p12
          echo "$INST_CERT_P12" | base64 --decode > inst.p12
          security import app.p12  -k "$KEYCHAIN" -P "$APP_CERT_PASSWORD"  -T /usr/bin/codesign -T /usr/bin/productbuild
          security import inst.p12 -k "$KEYCHAIN" -P "$INST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm -f app.p12 inst.p12

      - name: Scrub bundle artifacts written by the smoke test
        if: github.event_name == 'push'
        # Belt-and-suspenders: even though CONFIG_FILE is now bundle-aware in
        # frozen builds, scrub any stray post-build writes (caches, .DS_Store,
        # configs that leaked into Frameworks/) before codesign — Apple's
        # codesign refuses to sign non-code subcomponents.
        run: |
          set -euo pipefail
          find dist/Pacefinder.app -name "simtelemetry.config.json" -print -delete || true
          find dist/Pacefinder.app -name ".DS_Store"                -print -delete || true

      - name: Embed Mac App Store provisioning profile
        if: github.event_name == 'push'
        env:
          PROFILE_B64: ${{ secrets.MAC_PROVISIONING_PROFILE }}
        # Apple's TestFlight pipeline requires the .app to ship with an
        # embedded provisioning profile (ITMS-90889). It must be placed at
        # the canonical Contents/embedded.provisionprofile path BEFORE
        # codesign — otherwise the signature is computed without it and
        # App Store Connect rejects the build.
        run: |
          set -euo pipefail
          if [ -z "${PROFILE_B64:-}" ]; then
            echo "ERROR: MAC_PROVISIONING_PROFILE secret is empty."
            echo "Create one at developer.apple.com → Profiles → + → Mac App Store"
            echo "for App ID app.pacefinder.macos with the Mac App Distribution cert,"
            echo "base64-encode it, and save as the MAC_PROVISIONING_PROFILE secret."
            exit 1
          fi
          echo "$PROFILE_B64" | base64 --decode > "dist/Pacefinder.app/Contents/embedded.provisionprofile"
          echo "Embedded $(wc -c < dist/Pacefinder.app/Contents/embedded.provisionprofile) bytes."

      - name: Codesign .app with sandbox entitlements
        if: github.event_name == 'push'
        # Inside-out signing: nested .framework bundles first (each as a
        # bundle, so its internal Info.plist + binary are signed together
        # with a coherent Designated Requirement — fixes ITMS-90238), then
        # loose .dylib / .so files, then the main executable, then the
        # outer .app bundle with entitlements.
        run: |
          set -euo pipefail
          # Modern cert name is "Apple Distribution" (Xcode-managed). Fall
          # back to the legacy "3rd Party Mac Developer Application" name
          # for older certs.
          APP_CERT_NAME=$(security find-identity -v -p codesigning | grep -E "Apple Distribution|3rd Party Mac Developer Application" | head -1 | awk -F'"' '{print $2}')
          echo "Signing with: $APP_CERT_NAME"

          # 1. Nested frameworks as bundles (recurses into each framework's
          #    Versions/<v>/<binary> + sub-frameworks). --deep is acceptable
          #    INSIDE a framework, just not on the outer .app.
          find "dist/Pacefinder.app" -type d -name "*.framework" -depth | while read -r fw; do
            echo "Signing framework: $fw"
            codesign --force --deep --timestamp --options runtime \
              --sign "$APP_CERT_NAME" "$fw"
          done

          # 2. Loose Mach-O subcomponents PyInstaller drops outside frameworks.
          find "dist/Pacefinder.app" -type f \( -name "*.dylib" -o -name "*.so" \) -not -path "*/Frameworks/*.framework/*" -exec \
            codesign --force --timestamp --options runtime --sign "$APP_CERT_NAME" {} \;

          # 3. Main executable.
          codesign --force --timestamp --options runtime \
            --entitlements packaging/mac/entitlements.plist \
            --sign "$APP_CERT_NAME" \
            "dist/Pacefinder.app/Contents/MacOS/pacefinder"

          # 4. Outer .app bundle — entitlements again so the bundle's seal
          #    references them. No --deep here: each subcomponent already
          #    has its own (correct) signature.
          codesign --force --timestamp --options runtime \
            --entitlements packaging/mac/entitlements.plist \
            --sign "$APP_CERT_NAME" \
            "dist/Pacefinder.app"

          # Verify with the same strict mode Apple's pipeline uses.
          codesign --verify --deep --strict --verbose=2 "dist/Pacefinder.app"

      - name: Build .pkg installer
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          INST_CERT_NAME=$(security find-identity -v | grep -E "Apple Distribution|3rd Party Mac Developer Installer" | head -1 | awk -F'"' '{print $2}')
          productbuild --component "dist/Pacefinder.app" /Applications \
            --sign "$INST_CERT_NAME" \
            "dist/Pacefinder-${PACEFINDER_VERSION}.pkg"

      - name: Pre-flight App Store Connect auth diagnostics
        if: github.event_name == 'push'
        env:
          API_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY_P8:    ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          set -euo pipefail
          # Sanity-check inputs without ever printing secret VALUES. We only
          # log lengths and a few-char prefix/suffix masked behind '***' so
          # the GH Actions log scrubber still hides everything.
          b64_len=${#API_KEY_P8}
          id_len=${#API_KEY_ID}
          iss_len=${#API_ISSUER_ID}
          echo "API_KEY_P8 base64 length:    $b64_len  (typical 320-360 chars)"
          echo "API_KEY_ID length:           $id_len   (expected 10)"
          echo "API_ISSUER_ID length:        $iss_len  (expected 36, UUID with 4 dashes)"

          mkdir -p ~/.appstoreconnect/private_keys
          p8_path="$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8"
          echo "$API_KEY_P8" | base64 --decode > "$p8_path"
          p8_size=$(wc -c < "$p8_path" | tr -d ' ')
          echo "Decoded .p8 file size:       $p8_size bytes  (valid Apple keys are ~241 bytes)"
          head -1 "$p8_path" | grep -q "BEGIN PRIVATE KEY" \
            && echo "PEM header OK (-----BEGIN PRIVATE KEY-----)" \
            || { echo "ERROR: decoded .p8 does not start with BEGIN PRIVATE KEY"; exit 1; }
          tail -1 "$p8_path" | grep -q "END PRIVATE KEY" \
            && echo "PEM footer OK (-----END PRIVATE KEY-----)" \
            || { echo "ERROR: decoded .p8 does not end with END PRIVATE KEY"; exit 1; }

          # Auth-only check — list providers. Fast, no upload, surfaces auth
          # failures with the same -26000 code but isolated from upload logic.
          echo
          echo "Running xcrun altool --list-providers …"
          xcrun altool --list-providers \
            --apiKey    "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID" 2>&1 | tee /tmp/list-providers.log
          if grep -q "Code=-26000\|Failure to authenticate" /tmp/list-providers.log; then
            echo
            echo "Auth check FAILED. One of the three inputs is wrong:"
            echo "  1. APP_STORE_CONNECT_API_KEY_P8     — base64 of AuthKey_<ID>.p8"
            echo "  2. APP_STORE_CONNECT_API_KEY_ID     — must match the .p8 filename digit-for-digit"
            echo "  3. APP_STORE_CONNECT_API_ISSUER_ID  — UUID at top of Keys page (NOT Team ID)"
            echo "  Also check: key role must be App Manager or Admin (not Developer)."
            exit 1
          fi
          echo "Auth OK."

      - name: Upload to App Store Connect (TestFlight + App Store distribution)
        if: github.event_name == 'push'
        env:
          API_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          # .p8 was written by the pre-flight step in the same job.
          xcrun altool --upload-app -f "dist/Pacefinder-${PACEFINDER_VERSION}.pkg" \
            --type osx \
            --apiKey    "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
          # Wipe the key — the runner is ephemeral but be explicit.
          rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8"

      - name: Upload .app as artifact (PR / dispatch runs)
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v4
        with:
          name: pacefinder-macos-app
          path: dist/Pacefinder.app

  # ─── Linux x64 · AppImage ───────────────────────────────────────────────────
  linux-appimage:
    name: Linux AppImage
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch:   x86_64
          - runner: ubuntu-24.04-arm
            arch:   aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends file desktop-file-utils

      - name: Fetch appimagetool
        run: |
          set -euo pipefail
          TOOL_URL="https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage"
          curl -fsSL -o appimagetool "$TOOL_URL"
          chmod +x appimagetool

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: PyInstaller build
        run: pyinstaller pacefinder.spec --clean --noconfirm

      - name: Smoke test (binary boots and serves /status)
        run: |
          set -euo pipefail
          ./dist/pacefinder/pacefinder --port 8765 &
          PID=$!
          trap "kill $PID 2>/dev/null || true" EXIT
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8765/status >/dev/null; then
              echo "smoke OK on try $i"; break
            fi
            sleep 1
            if [ "$i" = "20" ]; then echo "smoke FAILED"; exit 1; fi
          done

      - name: Assemble AppDir
        run: |
          set -euo pipefail
          APPDIR=Pacefinder.AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/applications" "$APPDIR/usr/share/icons/hicolor/512x512/apps"

          # Drop the PyInstaller dist tree under usr/bin and expose the entrypoint.
          cp -r dist/pacefinder/. "$APPDIR/usr/bin/"
          chmod +x "$APPDIR/usr/bin/pacefinder"

          cp packaging/appimage/AppRun "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"
          cp packaging/appimage/pacefinder.desktop "$APPDIR/pacefinder.desktop"
          cp packaging/appimage/pacefinder.desktop "$APPDIR/usr/share/applications/"

          if [ -f packaging/icons/pacefinder.png ]; then
            cp packaging/icons/pacefinder.png "$APPDIR/pacefinder.png"
            cp packaging/icons/pacefinder.png "$APPDIR/.DirIcon"
            cp packaging/icons/pacefinder.png "$APPDIR/usr/share/icons/hicolor/512x512/apps/"
          else
            # appimagetool requires *some* icon next to the .desktop file —
            # generate a 1×1 transparent PNG as a stand-in until real artwork lands.
            python -c "import base64,pathlib; pathlib.Path('p.png').write_bytes(base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='))"
            cp p.png "$APPDIR/pacefinder.png"
            cp p.png "$APPDIR/.DirIcon"
          fi

      - name: Build AppImage
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          OUT="Pacefinder-${{ steps.version.outputs.version }}-${{ matrix.arch }}.AppImage"
          ./appimagetool --no-appstream Pacefinder.AppDir "$OUT"
          ls -lh "$OUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacefinder-${{ matrix.arch }}-appimage
          path: Pacefinder-*.AppImage

  # ─── Docker · multi-arch → GHCR ─────────────────────────────────────────────
  docker:
    name: Docker (multi-arch → GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/estetika101/pacefinder
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build (and push on tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── GitHub Release · attach AppImages ──────────────────────────────────────
  release:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs: [mac-app, linux-appimage, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pacefinder-*-appimage
          path: artifacts
          merge-multiple: true

      - name: Compose release body
        id: body
        # Leads with end-user install snippets for the four non-source
        # channels, then defers to GitHub's auto-generated PR changelog.
        # `generate_release_notes: true` appends the auto-changelog AFTER
        # whatever's in `body:` — so users see install steps first.
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          {
            echo "## Install"
            echo
            echo "### macOS — TestFlight"
            echo "Public TestFlight link: _coming once external testing opens_. Currently invite-only for internal testers — see [pacefinder.app](https://pacefinder.app#install) to request access."
            echo
            echo "### Linux x86_64 (Intel/AMD)"
            echo '```sh'
            echo "curl -L -o Pacefinder.AppImage 'https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/Pacefinder-${tag#v}-x86_64.AppImage'"
            echo "chmod +x Pacefinder.AppImage"
            echo "./Pacefinder.AppImage"
            echo '```'
            echo
            echo "### Linux aarch64 (Raspberry Pi 4 / Pi 5 / Apple Silicon Linux VMs)"
            echo '```sh'
            echo "curl -L -o Pacefinder.AppImage 'https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/Pacefinder-${tag#v}-aarch64.AppImage'"
            echo "chmod +x Pacefinder.AppImage"
            echo "./Pacefinder.AppImage"
            echo '```'
            echo
            echo "### Docker (any OS, multi-arch)"
            echo '```sh'
            echo "docker run --rm -p 5300:5300/udp -p 8000:8000 -v \"\$(pwd)/pacefinder-data:/data\" \\"
            echo "  ghcr.io/estetika101/pacefinder:${tag#v}"
            echo '```'
            echo
            echo "Then open <http://localhost:8000> and point your game's UDP Data Out at this machine on port 5300."
            echo
            echo "---"
          } > release-body.md
          {
            echo "body_file=release-body.md"
          } >> "$GITHUB_OUTPUT"

      - name: Create release with AppImages
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/Pacefinder-*.AppImage
          body_path: release-body.md
          generate_release_notes: true   # auto-changelog is appended below the body
