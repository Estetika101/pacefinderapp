# Cross-repo trigger — when we publish a GitHub Release here, send a
# repository_dispatch to pacefindermarketing so its screenshots.yml runs
# against the tagged listener code. Marketing site then auto-deploys via
# Vercel on the resulting `chore: update screenshots` push.
#
# Requires a fine-grained PAT stored as the MARKETING_DISPATCH_TOKEN
# secret on THIS repo, scoped to:
#   - Repository: Estetika101/pacefindermarketing
#   - Permissions: Contents (read), Metadata (read), Actions (write)
# The default GITHUB_TOKEN can't cross repo boundaries, hence the PAT.
#
# If the secret is missing, the workflow no-ops gracefully (logs and exits 0)
# instead of failing the release pipeline — the screenshot run is non-critical.

name: Notify marketing of release

on:
  release:
    types: [published]
  # Allow manually re-firing for an existing tag (e.g. when we ship a
  # marketing-only update that should re-screenshot against the same release).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to send to marketing (defaults to latest release)'
        required: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Resolve tag
        id: tag
        run: |
          # release event → use the release tag; manual → use the input or latest
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=$(gh release view --json tagName -q .tagName)" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Dispatch to pacefindermarketing
        env:
          DISPATCH_TOKEN: ${{ secrets.MARKETING_DISPATCH_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::warning::MARKETING_DISPATCH_TOKEN not set — skipping (see notify-marketing.yml header for setup)."
            exit 0
          fi
          echo "Dispatching refresh-screenshots for tag=$TAG"
          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Estetika101/pacefindermarketing/dispatches \
            -d "{\"event_type\":\"refresh-screenshots\",\"client_payload\":{\"tag\":\"$TAG\",\"source\":\"pacefinderapp\"}}"
          echo "✓ dispatch sent"
